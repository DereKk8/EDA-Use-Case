

services:
  backend-dev:
    command: sh -c "cd /workspace/backend && pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"

  frontend-dev:
    image: node:20-alpine
    working_dir: /workspace/frontend
    command: sh -c "npm install && npm run dev"
    volumes:
      - ..:/workspace:cached
    ports:
      - "5173:5173"
    networks:
      - eda-network

networks:
  eda-network:
    name: eda-network
