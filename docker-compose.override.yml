

services:
  backend-dev:
    command: sh -c "cd /workspace/backend && pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  worker-dev:
    image: python:3.11-slim
    working_dir: /workspace
    command: sh -c "cd /workspace/backend && pip install --no-cache-dir -r requirements.txt && python -m app.worker"
    depends_on:
      - kafka
      - redis
    volumes:
      - ..:/workspace:cached
    networks:
      - eda-network
    init: true

  frontend-dev:
    image: node:20-alpine
    working_dir: /workspace/frontend
    command: sh -c "npm ci && npm run dev"
    environment:
      VITE_API_PROXY_TARGET: http://backend-dev:8000
    depends_on:
      backend-dev:
        condition: service_healthy
    volumes:
      - ..:/workspace:cached
      - frontend_node_modules:/workspace/frontend/node_modules
    ports:
      - "5173:5173"
    networks:
      - eda-network

networks:
  eda-network:
    name: eda-network

volumes:
  frontend_node_modules:
