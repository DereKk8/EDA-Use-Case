server {
    listen 5173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS (127.0.0.11). Without this, nginx resolves `backend` once at
    # startup and can cache the wrong container IP (e.g. worker), causing 502 / connection refused.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    location /productos {
        set $api_upstream backend:8000;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /notificaciones {
        set $api_upstream backend:8000;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /pedidos {
        set $api_upstream backend:8000;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /health {
        set $api_upstream backend:8000;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
